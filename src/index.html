<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div class="projects">
        <div id="projects__logo"> <h1>Taskflow</h1></div>
        <div id="projects__search">
            <h3>PROJECTS</h3>
            <div id="create-project">
                <h3>create new project</h3>
                <button id="open-create-project-dialog-btn">+</button>
            </div>
            <input type="text" id="project-search-input" placeholder="Search projects...">
        </div>
        <div id="projects__list">

        </div>
    </div>

    <main class="project-items">
        <div class="project-items__search container">
                <div class="todo-search">
                    <input type="text" id="project-item-search-input" placeholder="Search project items...">
                    <button id="project-items__create-todo-btn">Add Todo</button>
                </div>
        </div>

        <div class="project-items__list container">
            <div class="project-items__title">
                <h2 id="project-items__title-text">Project: <span id="project-title"></span></h2>
                <div class="project-items__sort">
                    <label for="sort-select">Sort by:</label>
                    <select id="sort-select">
                        <option value="due-date">Due Date</option>
                        <option value="priority">Priority</option>
                        <option value="creation-date">Creation Date</option>
                    </select>
                </div>
            </div>

        </div>

    </main>

    <dialog id="create-project-dialog">
        <form id="create-project-form">
            <h3>Create New Project</h3>
            <div class="form-group">
                <label for="project-name">Project Name:</label>
                <input type="text" id="project-name" name="project-name" required>
            </div>
            <div class="form-group">
                <label for="project-description">Description:</label>
                <textarea id="project-description" name="project-description" required></textarea>
            </div>
            <div class="dialog-buttons">
                <button commandfor="create-project-dialog" command="close" id="cancel-project-btn">Cancel</button>
                <button id="create-project-btn">Create Project</button>
            </div>
        </form>
    </dialog>

</body>

</html>
